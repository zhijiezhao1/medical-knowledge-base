<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>医学知识库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>">
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <!-- ========== Password Gate ========== -->
  <div class="password-gate" id="passwordGate">
    <div class="password-box">
      <div class="password-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 class="password-title">医学知识库</h2>
      <p class="password-subtitle">请输入访问密码</p>
      <form class="password-form" id="passwordForm">
        <input type="password" id="passwordInput" class="password-input" placeholder="请输入密码" autocomplete="current-password">
        <button type="submit" class="password-btn">进入知识库</button>
      </form>
      <p class="password-error" id="passwordError" style="display:none;">密码错误，请重试</p>
    </div>
  </div>

  <!-- ========== Top Navbar ========== -->
  <nav class="navbar">
    <div class="navbar-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>医学知识库</span>
    </div>
    <div class="navbar-search">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="navSearch" type="text" placeholder="搜索知识库...">
      <span class="search-kbd">Ctrl+K</span>
    </div>
    <div class="navbar-actions">
      <button class="btn-upload" id="navUploadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>上传文件</span>
      </button>
    </div>
  </nav>

  <!-- ========== Search Panel ========== -->
  <div class="search-panel" id="searchPanel" style="display:none;">
    <div class="search-panel-input-row">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--primary);pointer-events:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-panel-input" id="searchInput" type="text" placeholder="输入关键词搜索...">
      <button class="btn-close-search" id="closeSearchBtn" title="关闭 (Esc)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="search-result-count" id="searchCount"></div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- ========== Main Content ========== -->
  <div class="page-content" id="pageContent">
    <!-- Toast -->
    <div id="toastContainer"></div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-zone-icon">📂</div>
      <div class="upload-zone-title">将文件拖拽到此处，或点击选择文件</div>
      <div class="upload-zone-subtitle">支持 .docx .rtf .txt 格式</div>
      <input type="file" id="fileInput" name="file" accept=".docx,.rtf,.txt" style="display:none">
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="docx">Word</button>
        <button class="filter-tab" data-filter="rtf">RTF</button>
        <button class="filter-tab" data-filter="txt">TXT</button>
      </div>
      <div class="sort-control">
        排序：
        <select id="sortSelect">
          <option value="desc">最新上传</option>
          <option value="asc">最早上传</option>
        </select>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      加载中...
    </div>

    <!-- Document List -->
    <div class="doc-list" id="docList"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-state-icon">📂</div>
      <div class="empty-state-title">知识库还没有文档</div>
      <div class="empty-state-sub">上传第一份医学文档开始构建知识库</div>
    </div>
  </div>

  <!-- ========== Delete Dialog ========== -->
  <div class="dialog-overlay" id="deleteDialog" style="display:none;">
    <div class="dialog-box">
      <div class="dialog-title">确认删除</div>
      <div class="dialog-message" id="deleteMsg"></div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-cancel" id="cancelDelete">取消</button>
        <button class="dialog-btn dialog-btn-delete" id="confirmDelete">确认删除</button>
      </div>
    </div>
  </div>

  <!-- ========== Mobile FAB ========== -->
  <button class="fab-upload" id="fabBtn" title="上传文档">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ========== App Script ========== -->
  <script src="app.js?v=45"></script>
</body>
</html>
