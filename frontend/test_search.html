<!DOCTYPE html>
<html>
<head>
  <title>搜索测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .search-results { margin-top: 20px; }
    .result-item { 
      border: 1px solid #ddd; 
      padding: 10px; 
      margin: 5px 0; 
      cursor: pointer;
      background: #f9f9f9;
    }
    .result-item:hover { background: #e9e9e9; }
    .doc-content { 
      border: 2px solid blue;
      padding: 10px;
      margin-top: 20px;
      min-height: 200px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>搜索测试</h1>
  <input type="text" id="searchInput" placeholder="输入关键词" style="padding:8px; width:300px;">
  <button onclick="doSearch()">搜索</button>
  <div id="results" class="search-results"></div>
  <div id="docContent" class="doc-content">文档内容将显示在这里...</div>
  
  <script>
    const API = 'http://127.0.0.1:8080/api';
    let activeKeyword = '';
    
    async function doSearch() {
      const kw = document.getElementById('searchInput').value.trim();
      if (!kw) return;
      
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '搜索中...';
      
      try {
        const response = await fetch(API + '/search?q=' + encodeURIComponent(kw));
        const data = await response.json();
        
        activeKeyword = kw;
        const results = data.results || [];
        
        if (results.length === 0) {
          resultsDiv.innerHTML = '未找到结果';
          return;
        }
        
        resultsDiv.innerHTML = results.map(r => 
          '<div class="result-item" data-id="' + r.id + '" onclick="loadDoc(' + r.id + ')">' +
            '<strong>' + r.title + '</strong> (匹配 ' + r.match_count + ' 处)' +
          '</div>'
        ).join('');
        
        console.log('搜索完成, 找到', results.length, '个结果');
      } catch (e) {
        console.error('搜索失败:', e);
        resultsDiv.innerHTML = '<p style="color:red">搜索失败</p>';
      }
    }
    
    async function loadDoc(id) {
      const docDiv = document.getElementById('docContent');
      docDiv.innerHTML = '加载中...';
      console.log('开始加载文档 ID:', id);
      
      try {
        const response = await fetch(API + '/documents/' + id);
        const data = await response.json();
        console.log('文档加载成功, html_content长度:', data.html_content?.length);
        
        docDiv.innerHTML = data.html_content || '<p>文档为空</p>';
        console.log('innerHTML设置完成');
        console.log('实际显示内容长度:', docDiv.innerHTML.length);
      } catch (e) {
        console.error('加载失败:', e);
        docDiv.innerHTML = '<p style="color:red">加载失败</p>';
      }
    }
    
    // 回车键搜索
    document.getElementById('searchInput').onkeypress = function(e) {
      if (e.key === 'Enter') doSearch();
    };
  </script>
</body>
</html>
